name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  unit-and-frontend-tests:
    name: Unit + frontend rendered-layer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit + rendered-layer tests
        run: >
          cargo test
          -p backend
          -p shared
          -p unit_tests
          -p frontend_core
          -p frontend_tests
          --lib --tests

  api-integration-strict:
    name: API integration tests (strict)
    runs-on: ubuntu-latest
    needs: unit-and-frontend-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Start Docker Compose stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: backend did not become healthy within 60s"
          docker compose logs
          exit 1

      - name: Bootstrap administrator
        run: |
          curl -sf -X POST http://localhost:8000/api/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"change-me-please-now"}' \
            || true

      - name: Run API integration tests (strict mode)
        env:
          API_TESTS_STRICT: "1"
        run: cargo test -p api_tests --tests

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

  e2e-playwright:
    name: E2E tests (Playwright / Chromium)
    runs-on: ubuntu-latest
    needs: api-integration-strict
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: docker compose up -d

      - name: Wait for frontend
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend reachable after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: frontend did not become reachable within 90s"
          docker compose logs
          exit 1

      - name: Bootstrap administrator
        run: |
          curl -sf -X POST http://localhost:8000/api/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"change-me-please-now"}' \
            || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package.json

      - name: Install npm dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        working-directory: e2e
        env:
          FRONTEND_URL: "http://localhost:3000"
          API_BASE: "http://localhost:8000"
          ADMIN_USER: "admin"
          ADMIN_PASS: "change-me-please-now"
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs
