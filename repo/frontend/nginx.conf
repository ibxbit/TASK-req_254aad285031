server {
    listen 80;
    server_name _;

    # Bigger bodies for image uploads (review / face / report attachments).
    client_max_body_size 12m;

    # /api proxied to the Rocket backend. No CORS config needed — same origin.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Service worker must be served at scope root with a no-cache header so
    # updates roll out on next load.
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        expires off;
    }

    # SPA fallback: everything else resolves to index.html for Dioxus router.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
