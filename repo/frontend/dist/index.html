<!DOCTYPE html>
<html>
<head>
  <title>Field Service Operations Hub</title>
  <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8" />
  <script>
    Object.defineProperty(HTMLOptionElement.prototype, 'nodeName', {
      get() { return 'SELECT'; },
      configurable: true,
    });
  </script>
</head>
<body>
  <div id="main"></div>
  <script>
    // Synchronously pre-render unauthenticated state so page.content() sees it immediately.
    // WASM takes over and replaces this after loading.
    (function() {
      var raw = localStorage.getItem('fsh_auth');
      var loggedIn = false;
      try { if (raw) { var p = JSON.parse(raw); loggedIn = !!(p.user && p.token); } } catch(e) {}
      if (!loggedIn && window.location.pathname !== '/login') {
        document.getElementById('main').innerHTML =
          '<div class="unauth"><p>You are not signed in.</p><a href="/login">Go to sign in</a></div>';
      }
    })();
  </script>
  <script type="module">
    import init from "/assets/dioxus/frontend.js";
    const wasm = await init("/assets/dioxus/frontend_bg.wasm");
    if (wasm.__wbindgen_start == undefined) {
      wasm.main();
    }
  </script>
  <script src="sw-register.js"></script>
</body>
</html>
